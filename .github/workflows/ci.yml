name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore src/HostFxrLib/HostFxrLib.csproj

      - name: Build
        run: dotnet build src/HostFxrLib/HostFxrLib.csproj -c Release --no-restore

      - name: Pack
        run: dotnet pack src/HostFxrLib/HostFxrLib.csproj -c Release --no-build

      - name: Run samples
        run: |
          dotnet run samples/dotnet-info.cs
          dotnet run samples/error-capture.cs

      - name: Upload packages
        uses: actions/upload-artifact@v7
        with:
          name: packages
          path: src/HostFxrLib/bin/Release/*.nupkg
